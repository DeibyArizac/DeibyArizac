<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal de la V exterior (izquierda) -->
    <linearGradient id="vLeftOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6b6b"/>
      <stop offset="50%" stop-color="#2d9d9d"/>
      <stop offset="100%" stop-color="#25857f"/>
    </linearGradient>

    <!-- Gradiente principal de la V exterior (derecha) -->
    <linearGradient id="vRightOuter" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d9d9d"/>
      <stop offset="50%" stop-color="#3dbdb0"/>
      <stop offset="100%" stop-color="#25857f"/>
    </linearGradient>

    <!-- Gradiente V interior (capa media - izquierda) -->
    <linearGradient id="vLeftInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f7a7a"/>
      <stop offset="100%" stop-color="#2a8f8f"/>
    </linearGradient>

    <!-- Gradiente V interior (capa media - derecha) -->
    <linearGradient id="vRightInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#35a8a0"/>
      <stop offset="100%" stop-color="#2a8f8f"/>
    </linearGradient>

    <!-- Gradiente V central (más interna) -->
    <linearGradient id="vCenter" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#236666"/>
      <stop offset="100%" stop-color="#1d5555"/>
    </linearGradient>
  </defs>

  <!-- V Exterior - Ala Izquierda -->
  <path
    d="M 45 45 L 256 467 L 256 380 L 120 45 Z"
    fill="url(#vLeftOuter)"
  />

  <!-- V Exterior - Ala Derecha -->
  <path
    d="M 467 45 L 256 467 L 256 380 L 392 45 Z"
    fill="url(#vRightOuter)"
  />

  <!-- V Interior - Ala Izquierda (capa media) -->
  <path
    d="M 120 45 L 256 380 L 256 295 L 175 45 Z"
    fill="url(#vLeftInner)"
    opacity="0.9"
  />

  <!-- V Interior - Ala Derecha (capa media) -->
  <path
    d="M 392 45 L 256 380 L 256 295 L 337 45 Z"
    fill="url(#vRightInner)"
    opacity="0.9"
  />

  <!-- V Central - Triángulo interior (más profunda) -->
  <path
    d="M 175 45 L 256 295 L 337 45 Z"
    fill="url(#vCenter)"
    opacity="0.7"
  />

  <!-- Línea de separación central (da profundidad) -->
  <path
    d="M 256 295 L 256 467"
    stroke="#1a5050"
    stroke-width="2"
    opacity="0.5"
  />
</svg>